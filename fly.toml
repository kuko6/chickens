# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "chickens"
primary_region = "fra"

[build]
  image = "ghcr.io/kuko6/chickens:latest"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true

[[vm]]
  size = "shared-cpu-1x"
  memory = '256mb'
