<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #87CEEB;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 3px solid #333;
            background-color: #90EE90;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .controls {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <h1>Chicken Game Demo</h1>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        <p>Use <strong>Arrow Left</strong> and <strong>Arrow Right</strong> to move the chicken</p>
        <p>Use <strong>A</strong> and <strong>D</strong> keys as alternative controls</p>
        <p>Press <strong>Spacebar</strong> to jump</p>
        <p>Press <strong>V</strong> to cluck</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // Game state
        const game = {
            player: {
                x: 400,
                y: 280,
                width: 48,
                height: 48,
                speed: 3,
                velocityX: 0,
                groundY: 328,
                velocityY: 0,
                jumpForce: -8,
                gravity: 0.4,
                isJumping: false,
                isClucking: false,
                cluckFrame: 0,
                cluckTimer: 0,
                cluckDelay: 6,
                cluckFrames: 4,
                facingRight: true,
                isMoving: false,
                currentFrame: 0,
                frameTimer: 0,
                frameDelay: 4
            },
            keys: {},
            sprites: {
                idle: null,
                run: null,
                jump: null,
                cluck: null
            },
            spritesLoaded: 0,
            spritesTotal: 4
        };

        // Load sprites
        const idleSprite = new Image();
        idleSprite.onload = () => {
            game.sprites.idle = idleSprite;
            game.spritesLoaded++;
        };
        idleSprite.src = 'assets/sprites/chickens.png';

        const runSprite = new Image();
        runSprite.onload = () => {
            game.sprites.run = runSprite;
            game.spritesLoaded++;
        };
        runSprite.src = 'assets/sprites/chickens_run.png';

        const jumpSprite = new Image();
        jumpSprite.onload = () => {
            game.sprites.jump = jumpSprite;
            game.spritesLoaded++;
        };
        jumpSprite.src = 'assets/sprites/chickens_jump.png';

        const cluckSprite = new Image();
        cluckSprite.onload = () => {
            game.sprites.cluck = cluckSprite;
            game.spritesLoaded++;
        };
        cluckSprite.src = 'assets/sprites/chickens_cluck.png';

        const cluckSound = new Audio('assets/sounds/chicken_cluck.mp3');

        // Keyboard input
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') e.preventDefault();
            game.keys[e.key] = true;
        });

        document.addEventListener('keyup', (e) => {
            game.keys[e.key] = false;
        });

        // Update game state
        function update() {
            // Handle input
            game.player.velocityX = 0;

            if (game.keys['ArrowLeft'] || game.keys['a'] || game.keys['A']) {
                game.player.velocityX = -game.player.speed;
                game.player.facingRight = false;
                game.player.isMoving = true;
            }
            if (game.keys['ArrowRight'] || game.keys['d'] || game.keys['D']) {
                game.player.velocityX = game.player.speed;
                game.player.facingRight = true;
                game.player.isMoving = true;
            }

            if (game.player.velocityX === 0) {
                game.player.isMoving = false;
                game.player.currentFrame = 0;
            }

            // Cluck
            if (game.keys['v'] && !game.player.isClucking && !game.player.isJumping) {
                game.player.isClucking = true;
                game.player.cluckFrame = 0;
                game.player.cluckTimer = 0;
                cluckSound.currentTime = 0;
                cluckSound.play().catch(() => {});
            }

            // Update cluck animation
            if (game.player.isClucking) {
                game.player.cluckTimer++;
                if (game.player.cluckTimer >= game.player.cluckDelay) {
                    game.player.cluckTimer = 0;
                    game.player.cluckFrame++;
                    if (game.player.cluckFrame >= game.player.cluckFrames) {
                        game.player.isClucking = false;
                    }
                }
            }

            // Jump
            if (game.keys[' '] && !game.player.isJumping) {
                game.player.velocityY = game.player.jumpForce;
                game.player.isJumping = true;
            }

            // Apply gravity
            game.player.velocityY += game.player.gravity;
            game.player.y += game.player.velocityY;

            // Land on ground
            if (game.player.y >= game.player.groundY) {
                game.player.y = game.player.groundY;
                game.player.velocityY = 0;
                game.player.isJumping = false;
            }

            // Update position
            game.player.x += game.player.velocityX;

            // Keep player on screen
            if (game.player.x < 0) game.player.x = 0;
            if (game.player.x > canvas.width - game.player.width) {
                game.player.x = canvas.width - game.player.width;
            }

            // Update animation frame
            if (game.player.isMoving) {
                game.player.frameTimer++;
                if (game.player.frameTimer >= game.player.frameDelay) {
                    game.player.frameTimer = 0;
                    game.player.currentFrame++;

                    // 2 frames in the run animation (32px / 16px per frame)
                    const maxFrames = 2;
                    if (game.player.currentFrame >= maxFrames) {
                        game.player.currentFrame = 0;
                    }
                }
            }
        }

        // Draw everything
        function draw() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw ground line
            ctx.strokeStyle = '#228B22';
            ctx.lineWidth = 2;
            ctx.beginPath();
            const groundLineY = game.player.groundY + game.player.height;
            ctx.moveTo(0, groundLineY);
            ctx.lineTo(canvas.width, groundLineY);
            ctx.stroke();

            // Only draw if sprites are loaded
            if (game.spritesLoaded < game.spritesTotal) {
                ctx.fillStyle = '#333';
                ctx.font = '20px Arial';
                ctx.fillText('Loading sprites...', canvas.width / 2 - 70, canvas.height / 2);
                return;
            }

            // Choose sprite based on state (jump > cluck > run > idle)
            let currentSprite, spriteWidth, spriteHeight, frameX;

            if (game.player.isJumping) {
                currentSprite = game.sprites.jump;
                spriteWidth = 16;
                spriteHeight = 16;
                frameX = 0;
            } else if (game.player.isClucking) {
                currentSprite = game.sprites.cluck;
                spriteWidth = 21;
                spriteHeight = 16;
                frameX = game.player.cluckFrame * spriteWidth;
            } else if (game.player.isMoving) {
                currentSprite = game.sprites.run;
                spriteWidth = 16;
                spriteHeight = 16;
                frameX = game.player.currentFrame * spriteWidth;
            } else {
                currentSprite = game.sprites.idle;
                spriteWidth = 16;
                spriteHeight = 16;
                frameX = 0;
            }

            // Scale width proportionally for wider frames
            const drawWidth = game.player.width * (spriteWidth / 16);
            const drawHeight = game.player.height;

            // Save context for flipping
            ctx.save();

            // Flip sprite if facing left
            if (!game.player.facingRight) {
                ctx.translate(game.player.x + drawWidth, game.player.y);
                ctx.scale(-1, 1);
                ctx.drawImage(
                    currentSprite,
                    frameX, 0,
                    spriteWidth, spriteHeight,
                    0, 0,
                    drawWidth, drawHeight
                );
            } else {
                ctx.drawImage(
                    currentSprite,
                    frameX, 0,
                    spriteWidth, spriteHeight,
                    game.player.x, game.player.y,
                    drawWidth, drawHeight
                );
            }

            ctx.restore();
        }

        // Game loop
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start game when sprites are loaded
        function checkSpritesLoaded() {
            if (game.spritesLoaded >= game.spritesTotal) {
                gameLoop();
            } else {
                setTimeout(checkSpritesLoaded, 100);
            }
        }

        checkSpritesLoaded();
    </script>
</body>
</html>
