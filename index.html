<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicken Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 1px solid #000000;
            background-color: #deebff;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .controls {
            margin-top: 20px;
            font-size: 16px;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- <h1>Chicken Game Demo</h1> -->
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    <div class="controls">
        <p>Use <strong>Arrow Left</strong> and <strong>Arrow Right</strong> to move the chicken</p>
        <p>Use <strong>A</strong> and <strong>D</strong> keys as alternative controls</p>
        <p>Press <strong>Spacebar</strong> to jump</p>
        <p>Press <strong>V</strong> to cluck</p>
    </div>

    <script type="module" src="js/main.js"></script>
</body>
</html>
